    </marker>
    <style>
      .label{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#111;text-anchor:middle}
      .small{font-size:15px}
      .tiny{font-size:14px}
      .bluefile{fill:#2b95cc}
      .orangefile{fill:#f5a24b}
      .bucket{fill:#d83a35;stroke:#fff;stroke-width:2}
      .icon{fill:none;stroke:#fff;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .flow{fill:none;stroke:#159bd7;stroke-width:5;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#8ecf91;stroke-width:5;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>

