<svg xmlns="http://www.w3.org/2000/svg" width="966" height="466" viewBox="0 0 966 466" role="img" aria-labelledby="title desc">
  <title id="title">S3, MediaConvert, CloudFront, and website streaming flow</title>
  <desc id="desc">A media streaming workflow where a movie file is uploaded to an S3 input bucket, processed by AWS Elemental MediaConvert, written as m3u8 and ts files to an S3 output bucket, delivered through CloudFront and an S3 website, then played on mobile and desktop devices.</desc>
