  <title id="title">Blog 2 Facebook post screenshot</title>
  <desc id="desc">A Facebook group content screen showing a pending post by Phan Tuan Danh about using Amazon CloudFront instead of serving video directly from Amazon S3, with an attached streaming architecture diagram.</desc>
