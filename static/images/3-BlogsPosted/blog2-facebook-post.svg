    <text class="ui bold" x="10" y="76" font-size="16">Chia sẻ một kinh nghiệm nhỏ khi xây dựng website xem phim trên</text>
    <text class="ui bold" x="10" y="98" font-size="16">AWS</text>
    <text class="ui" x="10" y="128" font-size="16">Xin chào mọi người,</text>
    <text class="ui" x="10" y="157" font-size="16">Trong quá trình phát triển dự án <tspan class="bold">Netflop</tspan>, nhóm mình từng đặt câu hỏi:</text>
    <text class="ui" x="10" y="187" font-size="16">Tại sao không phát video trực tiếp từ Amazon S3 mà lại phải dùng</text>
    <text class="ui" x="10" y="209" font-size="16">thêm Amazon CloudFront?</text>
    <text class="ui" x="10" y="238" font-size="16">Sau khi tìm hiểu và triển khai thực tế, nhóm nhận thấy CloudFront</text>
    <text class="ui" x="10" y="260" font-size="16">mang lại rất nhiều lợi ích.</text>
    <text class="ui bold" x="10" y="291" font-size="16">Xem thêm</text>

