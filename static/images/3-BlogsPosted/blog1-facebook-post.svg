<svg xmlns="http://www.w3.org/2000/svg" width="1228" height="526" viewBox="0 0 1228 526" role="img" aria-labelledby="title desc">
  <title id="title">Blog 1 Facebook post screenshot</title>
  <desc id="desc">A Facebook group content screen showing a pending post by Phan Tuan Danh about choosing AWS Elemental MediaConvert instead of FFmpeg for the Netflop movie streaming website.</desc>
  <defs>
    <style>
      .ui{font-family:Arial,Helvetica,sans-serif;fill:#050505}
      .muted{fill:#65676b}
      .bold{font-weight:700}
      .panel{fill:#fff}
      .bg{fill:#f0f2f5}
      .selected{fill:#e7f3ff}
      .button{fill:#e4e6eb}
      .linkbox{fill:#f0f2f5;stroke:#d8dadf;stroke-width:1}
    </style>
  </defs>
  <rect class="bg" width="1228" height="526"/>

  <rect class="panel" x="0" y="0" width="347" height="526"/>
  <text class="ui muted" x="4" y="20" font-size="14">AWS Study Group VN › Nội dung của bạn</text>
  <text class="ui bold" x="4" y="48" font-size="24">Nội dung của bạn</text>
  <text class="ui muted" x="4" y="74" font-size="16">Quản lý và xem bài viết của bạn trong nhóm này.</text>
  <text class="ui muted" x="4" y="95" font-size="16">Quản trị viên và người kiểm duyệt có thể đóng</text>
  <text class="ui muted" x="4" y="116" font-size="16">góp ý kiến.</text>

  <rect class="selected" x="0" y="135" width="339" height="58" rx="8"/>
  <circle cx="21" cy="162" r="18" fill="#1877f2"/>
  <rect x="12" y="153" width="18" height="18" rx="2" fill="#fff"/>
  <path d="M16 158h10M16 163h10M16 168h7" stroke="#1877f2" stroke-width="2" stroke-linecap="round"/>
  <text class="ui bold" x="51" y="158" font-size="16">Đang chờ</text>
  <circle cx="55" cy="177" r="4" fill="#1877f2"/>
  <text class="ui muted" x="68" y="181" font-size="14">2 bài viết</text>

  <circle cx="21" cy="219" r="18" fill="#e4e6eb"/>
  <rect x="12" y="211" width="18" height="16" rx="3" fill="#242526"/>
  <circle cx="21" cy="219" r="4" fill="#e4e6eb"/>
  <text class="ui bold" x="51" y="217" font-size="16">Đã đăng</text>
  <circle cx="55" cy="238" r="4" fill="#1877f2"/>
  <text class="ui muted" x="68" y="242" font-size="14">1 bài viết</text>

  <circle cx="21" cy="277" r="18" fill="#e4e6eb"/>
  <rect x="12" y="269" width="18" height="16" rx="3" fill="#242526"/>
  <path d="M17 273l8 8M25 273l-8 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <text class="ui bold" x="51" y="275" font-size="16">Đã từ chối kèm theo ý kiến đóng góp</text>

  <circle cx="21" cy="330" r="18" fill="#e4e6eb"/>
  <path d="M12 324h18M15 324l2 18h8l2-18M17 320h8" stroke="#242526" stroke-width="3" stroke-linecap="round"/>
  <text class="ui bold" x="51" y="328" font-size="16">Đã gỡ kèm theo ý kiến đóng góp</text>

  <g transform="translate(569 120)">
    <rect class="panel" width="501" height="403" rx="12" stroke="#d8dadf"/>
    <circle cx="32" cy="31" r="20" fill="#d9e9f7"/>
    <circle cx="26" cy="25" r="8" fill="#87b45b"/>
    <circle cx="38" cy="37" r="12" fill="#537fb9"/>
    <text class="ui bold" x="61" y="27" font-size="15">Phan Tuấn Danh ▸ AWS Study Group VN</text>
    <text class="ui muted" x="61" y="47" font-size="13">19 tháng 7 lúc 18:48 · 🌐</text>
    <text class="ui muted" x="464" y="30" font-size="24">...</text>

    <text class="ui" x="12" y="75" font-size="16">Xin chào mọi người,</text>
    <text class="ui" x="12" y="103" font-size="16">Trong quá trình thực hiện dự án <tspan class="bold">Netflop - Website xem phim trên nền</tspan></text>
    <text class="ui bold" x="12" y="125" font-size="16">tảng AWS</text>
    <text class="ui" x="84" y="125" font-size="16">, nhóm mình đã có cơ hội tìm hiểu và triển khai nhiều dịch vụ</text>
    <text class="ui" x="12" y="147" font-size="16">AWS để xây dựng một media pipeline hoàn chỉnh. Một trong những</text>
    <text class="ui" x="12" y="169" font-size="16">quyết định khiến nhóm mất khá nhiều thời gian để cân nhắc là lựa</text>
    <text class="ui bold" x="12" y="191" font-size="16">chọn giải pháp encode video.</text>

    <text class="ui" x="12" y="225" font-size="16">Ban đầu, nhóm dự định sử dụng <tspan class="bold">FFmpeg chạy trực tiếp trên Amazon</tspan></text>
    <text class="ui bold" x="12" y="247" font-size="16">EC2</text>
    <text class="ui" x="45" y="247" font-size="16"> để chuyển đổi video sau khi upload. Tuy nhiên, sau khi thử nghiệm</text>
    <text class="ui" x="12" y="269" font-size="16">với nhiều video có dung lượng lớn... <tspan class="bold">Xem thêm</tspan></text>

    <rect class="linkbox" x="0" y="292" width="501" height="66"/>
    <text class="ui muted" x="16" y="320" font-size="13">DOCS.AWS.AMAZON.COM</text>
    <text class="ui bold" x="16" y="345" font-size="18">What is AWS Elemental MediaConvert? - MediaConvert</text>

    <rect class="button" x="16" y="371" width="230" height="36" rx="8"/>
    <rect class="button" x="254" y="371" width="230" height="36" rx="8"/>
    <text class="ui bold" x="131" y="395" font-size="16" text-anchor="middle">Chỉnh sửa</text>
    <text class="ui bold" x="369" y="395" font-size="16" text-anchor="middle">Xóa</text>
    <circle cx="472" cy="283" r="15" fill="#fff" stroke="#ddd"/>
    <text class="ui bold" x="472" y="290" font-size="20" text-anchor="middle">i</text>
  </g>

  <g transform="translate(570 -315)" opacity=".95">
    <rect class="panel" width="500" height="420" rx="12" stroke="#d8dadf"/>
    <rect x="0" y="0" width="242" height="349" fill="none" stroke="#f20b22" stroke-width="3"/>
    <rect class="button" x="16" y="367" width="230" height="36" rx="8"/>
    <rect class="button" x="254" y="367" width="230" height="36" rx="8"/>
    <text class="ui bold" x="131" y="391" font-size="16" text-anchor="middle">Chỉnh sửa</text>
    <text class="ui bold" x="369" y="391" font-size="16" text-anchor="middle">Xóa</text>
  </g>
</svg>
